<!DOCTYPE html>
<html>

<head>

<title>Your Cart</title>

<script src="/js/cart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
font-family:Poppins;
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#f5f6fa;
}


/* header */

.header{

background:white;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 8px rgba(0,0,0,0.05);

}

.logo{
font-size:22px;
font-weight:600;
color:#27ae60;
}


/* layout */

.container{

display:flex;
gap:20px;
padding:20px 40px;

}


/* cart items */

.cart-items{

flex:2;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);

}

.item{

display:flex;
align-items:center;
justify-content:space-between;
border-bottom:1px solid #eee;
padding:10px 0;

}

.item img{

width:60px;
height:60px;
object-fit:contain;

}

.item-name{

flex:1;
margin-left:15px;

}

.qty{

display:flex;
align-items:center;
gap:8px;

}

.qty button{

width:25px;
height:25px;
border:none;
background:#27ae60;
color:white;
border-radius:5px;
cursor:pointer;

}

.price{

font-weight:600;

}


/* summary */

.summary{

flex:1;
background:white;
padding:20px;
border-radius:12px;
height:fit-content;
box-shadow:0 2px 8px rgba(0,0,0,0.05);

}

.summary h3{

margin-bottom:10px;

}

.row{

display:flex;
justify-content:space-between;
margin:8px 0;

}

.total{

font-size:18px;
font-weight:600;

}

button.place{

width:100%;
padding:10px;
background:#27ae60;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:15px;

}

button.place:hover{

background:#1e8449;

}


/* address */

.address{

margin-top:15px;
padding:10px;
background:#f9fafc;
border-radius:8px;

}


/* payment */

select{

width:100%;
padding:8px;
margin-top:10px;

}

.payment-options{

margin-top:10px;
display:flex;
flex-direction:column;
gap:10px;

}

.pay-card{

display:flex;
align-items:center;
gap:12px;
padding:10px;
border:1px solid #ddd;
border-radius:8px;
cursor:pointer;
transition:0.2s;
background:#fafafa;

}

.pay-card img{

width:35px;
height:35px;

}

.pay-card:hover{

border-color:#27ae60;
background:#e8f5e9;

}

.pay-selected{

border:2px solid #27ae60;
background:#e8f5e9;

}

.delivery-box{

background:#f6fff8;

padding:14px;

border-radius:12px;

border:1px solid #e3f3e7;

margin-top:10px;

}

.delivery-box h4{

margin:0;

font-size:14px;

color:#0c831f;

}

#userAddress{

font-size:13px;

margin-top:5px;

line-height:1.4;

color:#333;

}
</style>

</head>



<body>


<div class="header">

<div class="logo">

FreshMart Cart 🛒

</div>

<a href="index.html">

Continue Shopping

</a>

</div>



<div class="container">


<!-- cart items -->

<div class="cart-items">

<h3>Your Items</h3>

<div id="cartItems"></div>

</div>



<!-- summary -->

<div class="summary">

<h3>Order Summary</h3>

<div class="row">

<span>Items Total</span>

<span id="itemsTotal">0</span>

</div>

<div class="row">

<span>Delivery Fee</span>

<span>₹20</span>

</div>

<hr>

<div class="row total">

<span>Total</span>

<span id="finalTotal">0</span>

</div>



<div class="address">

<h4>Delivery to:</h4>

<p id="userAddress"></p>

</div>



<h3>Payment Method</h3>

<div class="payment-options">

<div class="pay-card" onclick="selectPayment('Cash on Delivery')">

<img src="https://cdn-icons-png.flaticon.com/512/2331/2331943.png">

<div>

<b>Cash on Delivery</b>

<p>Pay when order arrives</p>

</div>

</div>



<div class="pay-card" onclick="selectPayment('UPI')">

<img src="https://cdn-icons-png.flaticon.com/512/825/825454.png">

<div>

<b>UPI Payment</b>

<p>Pay using Google Pay, PhonePe</p>

</div>

</div>



<div class="pay-card" onclick="selectPayment('Card')">

<img src="https://cdn-icons-png.flaticon.com/512/633/633611.png">

<div>

<b>Credit / Debit Card</b>

<p>Visa, Mastercard accepted</p>

</div>

</div>

</div>


<input type="hidden" id="paymentMethod">


<div id="orderMessage"></div>
<button class="place" onclick="placeOrder()">

Place Order

</button>

</div>


</div>



<script>



loadCart();


/* show cart items */

function loadCart(){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let html="";
let total=0;

cart.forEach((item,index)=>{

total += item.price * item.quantity;

html += `

<div class="item">

<img src="/images/${item.image}">

<div class="item-name">
${item.name}
</div>

<div class="qty">

<button onclick="changeQty(${index},-1)">-</button>

<span>${item.quantity}</span>

<button onclick="changeQty(${index},1)">+</button>

</div>

<div class="price">

₹${item.price * item.quantity}

</div>

</div>

`;

});

document.getElementById("cartItems").innerHTML = html;

document.getElementById("itemsTotal").innerText = total;

document.getElementById("finalTotal").innerText = total + 20;

}



loadCart();

/* change quantity */

function changeQty(index,change){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

cart[index].quantity += change;


if(cart[index].quantity<=0){

cart.splice(index,1);

}


localStorage.setItem("cart",JSON.stringify(cart));


loadCart();

}


/* show address */

document.getElementById("userAddress").innerHTML =

"<b>" + localStorage.getItem("userName") + "</b><br>" +

localStorage.getItem("userAddress");

loadCart();

function selectPayment(method){

document.getElementById("paymentMethod").value = method;


/* highlight selected card */

document.querySelectorAll(".pay-card")

.forEach(card=>{

card.classList.remove("pay-selected");

});


event.currentTarget.classList.add("pay-selected");

}

let payment=document.getElementById("paymentMethod").value;

loadCart();

function placeOrder(){

let userId = localStorage.getItem("userId");

if(!userId){

alert("Please login first");

return;

}


if(cart.length===0){

alert("Cart is empty");

return;

}


let paymentMethod =
document.getElementById("paymentMethod").value || "COD";


let total = 0;

cart.forEach(item=>{

total += item.price * item.quantity;

});


fetch("http://localhost:5000/api/orders",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

user_id:Number(userId),
items:cart,
total_price:total,
payment_method:paymentMethod

})

})

.then(res=>res.json())

.then(data=>{

if(data.success){

/* clear cart */

cart=[];

localStorage.removeItem("cart");

updateCartCount();


/* show small success text */

document.getElementById("orderMessage").innerHTML =

"Order placed successfully! Redirecting...";


/* redirect after 1 second */

setTimeout(()=>{

window.location.href="/index.html";

},1000);

}

else{

alert(data.message);

}

})

.catch(err=>{

console.log(err);

alert("Server error");

});

}

</script>



</body>

</html>
