<!DOCTYPE html>
<html>

<head>

<title>Create Account - FreshMart</title>

<link rel="stylesheet" href="/css/style.css">

<style>

body{
font-family:'Poppins', Arial;

background: linear-gradient(120deg,#ffffff,#f1fff5);

margin:0;

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;
}

/* logo */

.logo{

text-align:center;

font-size:30px;

font-weight:700;

color:#0c831f;

margin-bottom:10px;

}

/* card */

.container{

background:white;

padding:35px;

width:380px;

border-radius:16px;

box-shadow:0 12px 35px rgba(0,0,0,0.07);

border:1px solid #eef2f1;

}

/* title */

h2{

text-align:center;

margin-bottom:20px;

font-weight:600;

}

/* inputs */

input{

width:100%;
padding:12px;
margin:6px 0 14px 0;
border-radius:8px;
border:1px solid #e0e0e0;
font-size:14px;
transition:0.2s;

}

input:focus{

outline:none;
border:1px solid #0c831f;
box-shadow:0 0 0 2px rgba(12,131,31,0.1);

}

/* address section */

.address-box{

background:#fafafa;
padding:15px;
border-radius:10px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #eee;

}

.address-box h3{

margin-top:0;
font-size:16px;

}

/* button */
button{

width:100%;

padding:13px;

border:none;

background:#0c831f;

color:white;

font-size:15px;

font-weight:600;

border-radius:8px;

cursor:pointer;

transition:0.2s;

}

button:hover{

background:#096b18;

}



/* login link */

.login-link{

text-align:center;
margin-top:15px;
font-size:14px;

}

.login-link a{

color:#0c831f;
text-decoration:none;
font-weight:500;

}
</style>

</head>



<body>




<div class="container">

<div class="logo">
FreshMart 🛒
</div>


<h2>Create Account</h2>


<form id="registerForm">


<label>Full Name</label>
<input type="text" id="name" required>


<label>Email</label>
<input type="email" id="email" required>


<label>Password</label>
<input type="password" id="password" required>


<label>Mobile Number</label>
<input type="text" id="mobile" placeholder="10 digit mobile number" required>


<div class="address-box">


<h3>Delivery Address</h3>


<label>Flat / House / Building</label>
<input type="text" id="building" required>


<label>Street Name</label>
<input type="text" id="street" required>


<label>Landmark</label>
<input type="text" id="landmark">


<label>City</label>
<input type="text" id="city" required>


<label>Pincode</label>
<input type="text" id="pincode" required>


</div>


<button type="submit">

Create Account

</button>


</form>


<p id="msg"></p>


<div class="login-link">

Already have account?

<a href="login.html">Login</a>

</div>


</div>



<script>

document.getElementById("registerForm")

.addEventListener("submit",function(e){

e.preventDefault();


let user={

name:document.getElementById("name").value,

email:document.getElementById("email").value,

password:document.getElementById("password").value,

mobile:document.getElementById("mobile").value,


address:{

building:document.getElementById("building").value,

street:document.getElementById("street").value,

landmark:document.getElementById("landmark").value,

city:document.getElementById("city").value,

pincode:document.getElementById("pincode").value

}

};


fetch("http://localhost:5000/api/auth/register",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(user)

})

.then(res=>res.text())

.then(data=>{

document.getElementById("msg").innerText=data;

});


});

</script>


</body>

</html>
