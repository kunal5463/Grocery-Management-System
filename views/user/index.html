<!DOCTYPE html>
<html>

<head>

<title>FreshMart Grocery</title>

<script src="/js/cart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:#f6f7fb;
}


/* NAVBAR */

.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 40px;
    background:#0c831f;
    color:white;
    position:sticky;
    top:0;
}

.logo{
    font-size:22px;
    font-weight:600;
}

.search-box{
width:40%;
}

.search-box input{
    width:350px;
    padding:10px;
    border-radius:8px;
    border:none;
}

.nav-right{
display:flex;
align-items:center;
gap:20px;
}

.cart-icon{
background:white;
color:#27ae60;
padding:8px 15px;
border-radius:20px;
text-decoration:none;
font-weight:500;
}

.location{
font-size:14px;
}

#welcomeUser{
font-weight:500;
}


/* banner */

.banner{
margin:20px 40px;
background:linear-gradient(90deg,#27ae60,#2ecc71);
padding:25px;
border-radius:12px;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
}


/* categories */

.categories{
padding:15px 40px;
display:flex;
gap:15px;
overflow-x:auto;
}

.cat{
background:white;
padding:8px 16px;
border-radius:20px;
cursor:pointer;
box-shadow:0 2px 5px rgba(0,0,0,0.05);
}

.cat:hover{
background:#27ae60;
color:white;
}


/* products */

.products{
padding:20px 40px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
text-align:center;
transition:0.2s;
}

.card:hover{
transform:translateY(-4px);
}

.card img{
width:100%;
height:140px;
object-fit:contain;
}

.title{
font-size:16px;
margin:5px 0;
}

.price{
font-weight:600;
color:#27ae60;
}

.stock{
font-size:12px;
color:gray;
}

button{
width:100%;
padding:8px;
border:none;
background:#27ae60;
color:white;
border-radius:6px;
cursor:pointer;
margin-top:8px;
}

button:hover{
background:#1e8449;
}

.address-box{

margin:15px 40px;
background:white;
padding:15px 20px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);

}

.address-title{

font-size:13px;
color:gray;

}

.address-value{

font-size:16px;
font-weight:500;
margin-top:3px;

}

.account-btn{
background:white;
color:#27ae60;
padding:8px 15px;
border-radius:20px;
text-decoration:none;
font-weight:500;
}

</style>

</head>



<body>



<!-- NAVBAR -->

<div class="navbar">

<div class="logo">
FreshMart 🛒
</div>


<div class="search-box">
<input type="text"
placeholder="Search for atta, milk, fruits..."
id="searchInput">
</div>


<div class="nav-right">

<a href="account.html" class="account-btn">
👤 My Account
</a>




<span id="welcomeUser"></span>


<a href="cart.html" class="cart-icon">
🛒 Cart (<span id="cartCount">0</span>)
</a>


<a href="#" onclick="logout()" style="color:white;">
Logout
</a>




</div>

</div>

<!-- ADDRESS BOX -->

<div class="address-box">

<div class="address-title">
Deliver to
</div>

<div class="address-value" id="userAddress">
Loading address...
</div>

</div>



<!-- BANNER -->

<div class="banner">

<div>

<h2>Fresh groceries delivered in minutes 🚀</h2>

<p>Best quality fruits, vegetables and daily essentials</p>

</div>

<img src="https://cdn-icons-png.flaticon.com/512/1046/1046857.png" width="80">

</div>



<!-- CATEGORY FILTER -->

<div class="categories" id="categoryList"></div>



<!-- PRODUCTS -->

<div class="products" id="productList"></div>



<script>



/* check login */

if(!localStorage.getItem("userId")){
window.location.href="/views/user/login.html";
}



/* logout */

function logout(){
localStorage.clear();
window.location.href="login.html";
}



/* show username */

let userName=localStorage.getItem("userName");

if(userName){
document.getElementById("welcomeUser").innerText="Hello, "+userName;
}



/* show address */

let address = localStorage.getItem("userAddress");

if(address){

document.getElementById("userAddress").innerText = address;

}else{

document.getElementById("userAddress").innerText =
"Add address";

}



/* cart count */

function updateCartCount(){

let cart=
JSON.parse(localStorage.getItem("cart"))||[];

document.getElementById("cartCount").innerText=
cart.length;

}

updateCartCount();



let allProducts=[];



/* load products */

fetch("http://localhost:5000/api/products")

.then(res=>res.json())

.then(data=>{

allProducts=data;

displayProducts(data);

createCategoryButtons(data);

});



/* show products */

function displayProducts(products){

let html="";

products.forEach(p=>{

html+=`

<div class="card">

<img src="/images/${p.image}">

<div class="title">${p.name}</div>

<div class="price">₹${p.price}</div>

<div class="stock">Stock: ${p.stock}</div>

<button onclick="addToCart(${p.id}, '${p.name}', ${p.price}, '${p.image}')">
Add to Cart
</button>

</div>

`;

});

document.getElementById("productList").innerHTML=html;

}



/* category buttons */

function createCategoryButtons(products){

let categories=["All"];

products.forEach(p=>{

if(!categories.includes(p.category)){

categories.push(p.category);

}

});


let html="";

categories.forEach(cat=>{

html+=`

<div class="cat"
onclick="filterCategory('${cat}')">

${cat}

</div>

`;

});


document.getElementById("categoryList").innerHTML=html;

}



/* filter */

function filterCategory(category){

if(category=="All"){

displayProducts(allProducts);

return;

}

let filtered=

allProducts.filter(p=>p.category==category);

displayProducts(filtered);

}



/* search */

document.getElementById("searchInput")

.addEventListener("input",function(){

let value=this.value.toLowerCase();

let filtered=

allProducts.filter(p=>

p.name.toLowerCase().includes(value)

);

displayProducts(filtered);

});



</script>



</body>

</html>
