<!DOCTYPE html>
<html>

<head>

<title>Admin Dashboard</title>

<link rel="stylesheet" href="/css/style.css">

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

.header{

background:#2c3e50;
color:white;
padding:15px;
text-align:center;
font-size:22px;

}

.container{

padding:20px;

}

.card{

background:white;
padding:20px;
margin:10px;
display:inline-block;
width:220px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;

}

button{

padding:10px;
background:#3498db;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
margin-right:10px;

}

button:hover{

background:#2980b9;

}

#lowStock{

color:red;
font-weight:bold;

}


/* orders table */

table{

width:100%;
background:white;
border-collapse:collapse;
margin-top:20px;

}

th,td{

padding:10px;
border-bottom:1px solid #ddd;
text-align:left;

}

th{

background:#34495e;
color:white;

}

.order-box{

background:white;
padding:15px;
margin-top:20px;
border-radius:8px;
box-shadow:0 0 8px rgba(0,0,0,0.08);

}

</style>

</head>

<body>

<div class="header">

Admin Dashboard

</div>


<div class="container">


<!-- summary cards -->

<div class="card">

<h3>Total Products</h3>

<p id="totalProducts">0</p>

</div>


<div class="card">

<h3>Total Orders</h3>

<p id="totalOrders">0</p>

</div>


<div class="card">

<h3>Low Stock Items</h3>

<p id="lowStock">0</p>

</div>


<br><br>


<a href="products.html">

<button>Manage Products</button>

</a>


<a href="orders.html">

<button>View Orders</button>

</a>


<a href="customers.html">

<button>Customers</button>

</a>



<!-- orders display -->

<h2>Customer Orders</h2>

<div id="ordersList"></div>


</div>



<script>


/* total products */

fetch("http://localhost:5000/api/products")

.then(res=>res.json())

.then(data=>{

document.getElementById("totalProducts").innerText=data.length;


let low=0;

data.forEach(p=>{

if(p.stock<5){

low++;

}

});

document.getElementById("lowStock").innerText=low;

});


/* load orders */

fetch("http://localhost:5000/api/orders")

.then(res=>res.json())

.then(data=>{

document.getElementById("totalOrders").innerText=data.length;


let html="";


data.forEach(order=>{


html+=`

<div class="order-box">


<h3>Customer: ${order.customerName}</h3>

<p><b>Address:</b> ${order.address}</p>

<p><b>Date:</b> ${order.date}</p>


<table>

<tr>

<th>Product</th>

<th>Qty</th>

<th>Price</th>

<th>Total</th>

</tr>

`;


order.items.forEach(item=>{


html+=`

<tr>

<td>${item.name}</td>

<td>${item.quantity}</td>

<td>₹${item.price}</td>

<td>₹${item.price * item.quantity}</td>

</tr>

`;

});


html+=`

</table>

</div>

`;

});


document.getElementById("ordersList").innerHTML=html;


});


</script>


</body>

</html>
