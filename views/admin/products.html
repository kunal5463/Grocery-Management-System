<!DOCTYPE html>
<html>

<head>

<title>Manage Products</title>

<link rel="stylesheet" href="/css/style.css">

<script src="/js/admin.js"></script>

<style>

body{

font-family:Arial;
background:#f5f5f5;
margin:0;

}

.header{

background:#2c3e50;
color:white;
padding:15px;
text-align:center;
font-size:22px;

}

.container{

padding:20px;

}

table{

width:100%;
background:white;
border-collapse:collapse;

}

th,td{

padding:10px;
border:1px solid gray;
text-align:center;

}

th{

background:#3498db;
color:white;

}

input{

padding:8px;
margin:5px;

}

button{

padding:8px 12px;
margin:5px;
background:#3498db;
color:white;
border:none;
border-radius:5px;
cursor:pointer;

}

button:hover{

background:#2980b9;

}

.form-box{

background:white;
padding:15px;
margin-bottom:20px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);

}

</style>

</head>

<body onload="loadProducts()">

<div class="header">

Manage Grocery Products

</div>


<div class="container">


<div class="form-box">

<h3>Add Product</h3>

<input id="name" placeholder="Product name">

<input id="category" placeholder="Category">

<input id="price" placeholder="Price">

<input id="stock" placeholder="Stock quantity">

<input id="image" placeholder="Image file name">

<button onclick="addProduct()">Add Product</button>

</div>



<div class="form-box">

<h3>Update Stock</h3>

<input id="productId" placeholder="Product ID">

<input id="newStock" placeholder="New Stock">

<button onclick="updateStock()">Update</button>

</div>



<h3>All Products</h3>

<table>

<thead>

<tr>

<th>ID</th>
<th>Name</th>
<th>Category</th>
<th>Price (₹)</th>
<th>Stock</th>
<th>Action</th>

</tr>

</thead>


<tbody id="productTable">

</tbody>


</table>



<br>

<a href="dashboard.html">

<button>

Back to Dashboard

</button>

</a>


</div>


</body>

</html>
